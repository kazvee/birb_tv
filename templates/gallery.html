<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>📁 {{ user|upper }}'s Gallery</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="{{ theme }}">

    <div class="navbar">
        <span>📁 {{ user|upper }}'s Gallery</span>

        <a href="/" class="nav-btn">← Back Home</a>
    </div>

    <div class="gallery">
        {% for img in images %}
        <div class="image-item">
            <input type="checkbox" name="selected" value="{{ img }}">
            <img src="{{ img }}" onclick="openLightbox('{{ img }}')">
        </div>
        {% endfor %}
    </div>

    <footer class="footer">
        <span>Made with 🩷 for 🐦 & 🐿️ frens.</span>
    </footer>

    <script>
        let currentSrc = '';

        function openLightbox(src) {
            currentSrc = src;
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');

            img.src = src;
            lightbox.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        function prevImage() {
            let imgs = document.querySelectorAll('.gallery img');
            for (let i = 0; i < imgs.length; i++) {
                if (imgs[i].src.endsWith(currentSrc.split('/').pop())) {
                    let prevIndex = (i - 1 + imgs.length) % imgs.length;
                    currentSrc = imgs[prevIndex].src;
                    document.getElementById('lightbox-img').src = currentSrc;
                    break;
                }
            }
        }

        function nextImage() {
            let imgs = document.querySelectorAll('.gallery img');
            for (let i = 0; i < imgs.length; i++) {
                if (imgs[i].src.endsWith(currentSrc.split('/').pop())) {
                    let nextIndex = (i + 1) % imgs.length;
                    currentSrc = imgs[nextIndex].src;
                    document.getElementById('lightbox-img').src = currentSrc;
                    break;
                }
            }
        }

        document.addEventListener('keydown', e => {
            const lightbox = document.getElementById('lightbox');
            if (lightbox.style.display !== 'flex') return;
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'Escape') closeLightbox();
        });
    </script>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="arrow" id="prev" onclick="event.stopPropagation(); prevImage();">&#10094;</span>
        <img id="lightbox-img">
        <span class="arrow" id="next" onclick="event.stopPropagation(); nextImage();">&#10095;</span>
    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>📁 {{ user|upper }}'s Gallery</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="{{ theme }}">

    <div class="navbar">
        <span>📁 {{ user|upper }}'s Gallery</span>

        <a href="/" class="nav-btn">← Back Home</a>
    </div>

    <form method="POST" action="/download_selected">

        <div class="actions">
            <button type="button" class="btn" onclick="selectAll(true)">Select All</button>
            <button type="button" class="btn" onclick="selectAll(false)">Clear</button>
            <button type="submit" class="btn">⬇️ Download Selected</button>
        </div>

        <div class="gallery">
            {% for img in images %}
            <div class="image-item">
                <input type="checkbox" name="selected" value="{{ img }}">
                <img src="{{ img }}" onclick="openLightbox('{{ img }}')">
            </div>
            {% endfor %}
        </div>

    </form>

    <div class="actions">
        {% if user == 'w' %}
        <form method="POST" action="/w_purge" onsubmit="return confirm('Delete ALL W\'s Photos?');">
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">❌ Delete ALL W's Photos</button>
        </form>
        {% endif %}

        {% if user == 'k' %}
        <form method="POST" action="/k_purge" onsubmit="return confirm('Delete ALL K\'s Photos?');">
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">❌ Delete ALL K's Photos</button>
        </form>
        {% endif %}
    </div>

    <footer class="footer">
        <span>Made with 🩷 for 🐦 & 🐿️ frens.</span>
    </footer>

    <script>
        function selectAll(state) {
            document.querySelectorAll('input[name="selected"]').forEach(cb => {
                cb.checked = state;
            });
        }

        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');

            img.src = src;
            lightbox.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img">
    </div>

</body>

</html>
